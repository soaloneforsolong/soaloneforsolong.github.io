<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script src="https://kit.fontawesome.com/8cf1deb42a.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="wrapper">
            <header class="header">
                <div class="header__container">
                    <a href="" class="header__logo">
                        <img src="img/paimon.png" alt="#" />
                    </a>
                    <nav class="header__menu menu">
                        <ul class="menu__list">
                            <li class="menu__item">
                                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="menu__link">guides</a>
                            </li>
                            <li class="menu__item">
                                <a href="" class="menu__link">tutorials</a>
                            </li>
                            <li class="menu__item">
                                <a href="https://genshin-impact-map.appsample.com/#/" class="menu__link">map</a>
                            </li>
                            <li class="menu__item">
                                <a href="" class="menu__link">gallery</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </header>
            <main class="page">
                <div class="page__main-block">
                    <div class="main-block__container">
                        <h1 class="main-block__title">Hey traveler!</h1>
                        <h2 class="main-block__text">
                            Here you can find everything <br />
                            you need in your journey!
                        </h2>
                        <div class="social">
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-twitter fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-discord fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-snapchat fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-youtube fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-instagram fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-vk fa-3x"></i>
                            </a>
                            <a href="" class="social__logo">
                                <i class="fa-brands fa-telegram fa-3x"></i>
                            </a>
                        </div>
                    </div>
                    <div class="picks__daily">
                        <div class="picks__daily__container">
                            <div class="picks__daily__text">Best pics today!</div>
                            <div class="gallery__frames">
                                <img src="img/photoset.png" alt="">
                            </div>
                            <div id="gallery">
                                <div class="carusel__photos">
                                    <img src="img/ganun.jpg">
                                    <img src="img/miko.jpg">
                                    <img src="img/sara.jpg">
                                    <img src="img/cat.jpg">
                                    <img src="img/thoma.jpeg">
                                </div>
                                <div class="buttons">
                                    <button class="prev">
                                        <img src="img/left-arrow.png" alt="">
                                    </button>
                                    <button class="next">
                                        <img src="img/right-arrow.png" alt="">
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="footer"></footer>
        </div>
        <script src="script.js"></script>
    </body>
</html>
